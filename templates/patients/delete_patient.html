{% extends "base.html" %}
{% block content %}

<div class="card">
    <h2>Delete Patient</h2>

    <p>Are you sure you want to delete "{{ patient.full_name }}"?</p>

    <form method="POST">
        {% csrf_token %}
        
        <div class="delete-actions">
            <button type="submit" class="btn btn-delete">Yes, Delete</button>
            <a href="{% url 'patient_list' %}" class="btn btn-primary">Cancel</a>
        </div>
    </form>   
</div>

{% endblock %}

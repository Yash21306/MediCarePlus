{% extends "dashboard_base.html" %}

{% block page_title %}Start Consultation{% endblock %}

{% block sidebar %} <a href="{% url 'doctor_dashboard' %}">Dashboard</a> <a href="{% url 'patients:patient_list' %}">Patients</a> <a href="{% url 'consultations:consultation_list' %}" class="active">Consultations</a>
{% endblock %}

{% block content %}

<div class="chart-card">

<h3>🩺 Consultation - {{ consultation.patient.full_name }}</h3>

<form method="post" class="consultation-form">

{% csrf_token %}

<div class="form-row">
<label>Symptoms</label>
<textarea name="symptoms" rows="3" class="form-input"></textarea>
</div>

<div class="form-row">
<label>Blood Pressure</label>
<input type="text" name="blood_pressure" class="form-input">
</div>

<div class="form-row">
<label>Temperature</label>
<input type="text" name="temperature" class="form-input">
</div>

<div class="form-row">
<label>Pulse</label>
<input type="text" name="pulse" class="form-input">
</div>

<div class="form-row">
<label>Notes</label>
<textarea name="notes" rows="3" class="form-input"></textarea>
</div>

<br>

<button type="submit" class="btn btn-consult">
🩺 Start Consultation
</button>

<a href="{% url 'consultations:consultation_list' %}" class="btn btn-primary">
← Back to Consultations
</a>

</form>

</div>

{% endblock %}

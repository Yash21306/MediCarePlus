<h2>Stock Report</h2>

<table>

<tr>
<th>Medicine</th>
<th>Total Stock</th>
<th>Batches</th>
<th>Stock Value</th>
</tr>

{% for item in stock_data %}

<tr>

<td>{{ item.medicine.name }}</td>

<td>{{ item.stock }}</td>

<td>{{ item.batches }}</td>

<td>₹ {{ item.value }}</td>

</tr>

{% empty %}

<tr>
<td colspan="4">No stock data available.</td>
</tr>

{% endfor %}

</table>

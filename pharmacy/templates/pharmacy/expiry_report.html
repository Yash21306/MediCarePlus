<h2>Expiry Report</h2>

<table>

<tr>
<th>Medicine</th>
<th>Batch</th>
<th>Expiry Date</th>
<th>Quantity</th>
</tr>

{% for batch in batches %}

<tr>

<td>{{ batch.medicine.name }}</td>

<td>{{ batch.batch_number }}</td>

<td>{{ batch.expiry_date }}</td>

<td>{{ batch.quantity }}</td>

</tr>

{% empty %}

<tr>
<td colspan="4">No medicines expiring soon.</td>
</tr>

{% endfor %}

</table>
